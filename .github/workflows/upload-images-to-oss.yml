name: Upload Images to Aliyun OSS

on:
  push:
    branches: [main]
    paths:
      - "public/images/**"

permissions:
  contents: write

concurrency:
  group: upload-images-to-oss-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Need previous commit for diff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OSS configuration
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          : "${OSS_ACCESS_KEY_ID:?Missing OSS_ACCESS_KEY_ID}"
          : "${OSS_ACCESS_KEY_SECRET:?Missing OSS_ACCESS_KEY_SECRET}"
          : "${OSS_BUCKET:?Missing OSS_BUCKET}"
          : "${OSS_REGION:?Missing OSS_REGION}"
          : "${OSS_ENDPOINT:?Missing OSS_ENDPOINT}"

      - name: Upload images to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node scripts/upload-to-oss.mjs

      - name: Commit MDX URL updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/*.mdx
          if git diff --cached --quiet; then
            echo "No MDX files were updated."
          else
            git commit -m "chore: replace local image refs with OSS URLs"
            git pull --rebase
            git push
          fi
